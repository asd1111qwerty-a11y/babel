<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Play Bubble.am, a free online multiplayer browser game. Eat smaller cells, avoid bigger ones, and climb the leaderboard. No download needed — play now!">
    <meta name="keywords" content="bubbleam, bubble.am, bubleam, buble.am, bubbleam.pl, bubleroyal.com, bubleroyal, agario, agar, io, cell, cells, virus, bacteria, blob, game, games, web game, html5, fun, flash">
    <meta name="robots" content="index, follow">
    <meta name="viewport"
        content="minimal-ui, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="google-site-verification" content="LiPNDr3AHPS_HBWWsUkIL3tYU5vIMQYR17AD7fvhuN4" />

    <title>Bubble.am</title>

    <link rel="canonical" href="https://bubbleam.site/">
    <meta property="og:title" content="Bubble.am — Free Bubble.am Browser Game">
    <meta property="og:description" content="Play Bubble.am free online. Eat smaller cells, avoid bigger ones, climb the leaderboard. No download needed!">
    <meta property="og:url" content="https://bubbleam.site/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Bubble.am — Free Bubble.am Browser Game">
    <meta name="twitter:description" content="Play Bubble.am free online. Eat smaller cells, avoid bigger ones!">

    <link id="favicon" rel="icon" type="image/png" href="assets/img/favicon.png" />

    <link href="https://fonts.googleapis.com/css?family=Ubuntu:700" rel="stylesheet">
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/index.css" rel="stylesheet">
    <script src="assets/js/footer.js"></script>
    <style>
        .guild-row {
            display: flex;
            align-items: center;
            padding: 8px 4px;
            border-bottom: 1px solid #eee;
            gap: 10px;
        }

        #overlays {
            display: flex !important;
            visibility: visible !important;
            opacity: 1 !important;
        }

        #helloDialog {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }

        .guild-rank {
            color: #888;
            font-size: 13px;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .guild-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #ddd;
            flex-shrink: 0;
            overflow: hidden;
        }

        .guild-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .guild-name {
            flex: 1;
            font-size: 14px;
            color: #337ab7;
            text-decoration: none;
        }

        .guild-name:hover {
            text-decoration: underline;
        }

        .guild-members {
            color: #888;
            font-size: 13px;
            width: 30px;
            text-align: center;
            flex-shrink: 0;
        }

        #createModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #createBox {
            background: white;
            border-radius: 12px;
            padding: 20px;
            width: 300px;
        }

        #footer {
            position: absolute !important;
            bottom: 15px !important;
            left: 0 !important;
            right: 0 !important;
            text-align: center !important;
        }
    </style>
</head>

<body>
    <canvas id="canvas" width="800" height="600"></canvas>

    <div id="overlays" style="display:flex !important;">
        <div id="helloDialog">
            <div style="font-size:14px; color:#888; margin-bottom:10px;">
                <a href="index.html">Bubble.am</a> » Guilds
            </div>

            <input id="searchBox" type="text" class="form-control" placeholder="Search" style="margin-bottom:10px;"
                oninput="filterGuilds()">

            <div style="display:flex; padding:4px; border-bottom:2px solid #eee; font-size:13px; color:#888; gap:10px;">
                <div style="width:20px;"></div>
                <div style="width:36px;"></div>
                <div style="flex:1; font-weight:bold; color:#333;">Guild name</div>
                <div style="width:30px; text-align:center;">👥</div>
                <div style="width:30px; text-align:center;">?</div>
            </div>

            <div id="guildList" style="max-height:280px; overflow-y:auto;">
                <div style="text-align:center; padding:20px; color:#888;">Loading...</div>
            </div>

            <div style="text-align:center; margin-top:10px;">
                <a href="#" onclick="openCreateModal()" style="color:#337ab7; font-size:14px;">Create new Guild</a>
            </div>

            <hr>
            <div id="footer">
                <div id="footerContainer"></div>
            </div>
        </div>
    </div>

    <div id="createModal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; border-radius:12px; padding:24px; width:340px; max-height:90vh; overflow-y:auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                <h4 style="margin:0;">Create new Guild</h4>
                <span onclick="closeCreateModal()" style="cursor:pointer; font-size:18px; color:#aaa;">✕</span>
            </div>
            <div style="text-align:center; font-weight:bold; margin-bottom:16px; font-size:14px;">Price:
                50 Pt.</div>

            <div style="margin-bottom:12px;">
                <label style="font-size:13px; color:#555; display:block; margin-bottom:4px;">Prefix</label>
                <input id="guildTag" type="text" class="form-control" placeholder="" maxlength="4">
            </div>

            <div style="margin-bottom:12px;">
                <label style="font-size:13px; color:#555; display:block; margin-bottom:4px;">Guild name</label>
                <input id="guildName" type="text" class="form-control" placeholder="" maxlength="19">
            </div>

            <div style="margin-bottom:12px;">
                <label style="font-size:13px; color:#555; display:block; margin-bottom:4px;">Type</label>
                <select id="guildType" class="form-control">
                    <option value="public">Public</option>
                    <option value="private">Private</option>
                </select>
            </div>

            <div style="margin-bottom:12px;">
                <label style="font-size:13px; color:#555; display:block; margin-bottom:4px;">Upload skin</label>
                <input type="file" id="guildSkin" accept="image/png" style="font-size:13px;">
                <div style="color:red; font-size:12px; margin-top:4px;">You can upload only PNG images.</div>
            </div>

            <div id="createMsg" style="font-size:13px; text-align:center; margin-bottom:8px;"></div>

            <button onclick="doCreateGuild()" class="btn btn-block"
                style="background:#337ab7; color:white; font-weight:bold; border:none; padding:10px;">
                Submit
            </button>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost'
            ? 'http://203.175.125.153'
            : 'http://203.175.125.153';
        const token = localStorage.getItem('token');

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 1;
        const gridSize = 40;
        for (let x = 0; x < canvas.width; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        let allGuilds = [];

        function renderGuilds(guilds) {
            const list = document.getElementById('guildList');
            if (guilds.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">No guilds found</div>';
                return;
            }
            list.innerHTML = guilds.map((g, i) => `
        <div class="guild-row">
            <div class="guild-avatar">
                <img src="${g.skin ? 'skins/' + g.skin + '.png' : 'assets/img/favicon.png'}" onerror="this.src='assets/img/favicon.png'">
            </div>
            <a href="guild.html?id=${g.id}" class="guild-name">${g.name} <span style="color:#888; font-size:12px;">[${g.tag}]</span></a>
            <div class="guild-members">${g.members}</div>
            <div class="guild-members" style="color:#aaa;">-</div>
        </div>
    `).join('');
        }

        function filterGuilds() {
            const q = document.getElementById('searchBox').value.toLowerCase();
            renderGuilds(allGuilds.filter(g => g.name.toLowerCase().includes(q)));
        }

        fetch(`${API_URL}/guilds`)
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    allGuilds = data.guilds;
                    renderGuilds(allGuilds);
                }
            });

        function openCreateModal() {
            if (!token) return window.location.href = 'login.html';
            document.getElementById('createModal').style.display = 'flex';
        }
        function closeCreateModal() {
            document.getElementById('createModal').style.display = 'none';
            document.getElementById('createMsg').innerText = '';
            document.getElementById('guildName').value = '';
            document.getElementById('guildTag').value = '';
        }

        function doCreateGuild() {
            const msg = document.getElementById('createMsg');
            const name = document.getElementById('guildName').value.trim();
            const tag = document.getElementById('guildTag').value.trim();
            const type = document.getElementById('guildType').value;
            const skinFile = document.getElementById('guildSkin').files[0];

            if (!name || !tag) { msg.style.color = 'red'; msg.innerText = 'Fill all fields!'; return; }
            if (skinFile && skinFile.type !== 'image/png') { msg.style.color = 'red'; msg.innerText = 'Only PNG allowed!'; return; }

            const formData = new FormData();
            formData.append('name', name);
            formData.append('tag', tag);
            formData.append('type', type);
            if (skinFile) formData.append('skin', skinFile);

            fetch(`${API_URL}/createguild`, {
                method: 'POST',
                headers: { 'Authorization': token },
                body: formData
            }).then(r => r.json()).then(data => {
                if (data.success) {
                    msg.style.color = 'green';
                    msg.innerText = '✓ Guild created!';
                    setTimeout(() => { closeCreateModal(); window.location.reload(); }, 1500);
                } else {
                    msg.style.color = 'red';
                    msg.innerText = '✗ ' + (data.message || 'Failed');
                }
            });
        }
        loadFooter('footerContainer');
    </script>
</body>

</html>
