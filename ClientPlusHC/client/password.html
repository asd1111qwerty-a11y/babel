<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Play Bubble.am, a free online multiplayer browser game. Eat smaller cells, avoid bigger ones, and climb the leaderboard. No download needed — play now!">
    <meta name="keywords" content="bubbleam, bubble.am, bubleam, buble.am, bubbleam.pl, bubleroyal.com, bubleroyal, agario, agar, io, cell, cells, virus, bacteria, blob, game, games, web game, html5, fun, flash">
    <meta name="robots" content="index, follow">
    <meta name="viewport"
        content="minimal-ui, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="google-site-verification" content="LiPNDr3AHPS_HBWWsUkIL3tYU5vIMQYR17AD7fvhuN4" />

    <title>Bubble.am</title>

    <link rel="canonical" href="https://bubbleam.site/">
    <meta property="og:title" content="Bubble.am — Free Bubble.am Browser Game">
    <meta property="og:description" content="Play Bubble.am free online. Eat smaller cells, avoid bigger ones, climb the leaderboard. No download needed!">
    <meta property="og:url" content="https://bubbleam.site/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Bubble.am — Free Bubble.am Browser Game">
    <meta name="twitter:description" content="Play Bubble.am free online. Eat smaller cells, avoid bigger ones!">

    <link id="favicon" rel="icon" type="image/png" href="assets/img/favicon.png" />

    <link href="https://fonts.googleapis.com/css?family=Ubuntu:700" rel="stylesheet">
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/index.css" rel="stylesheet">
    <script src="assets/js/footer.js"></script>
    <style>
        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
        }

        .form-control {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <div id="loginOverlay">
        <div id="helloDialog">
            <div style="font-size:14px; color:#888; margin-bottom:10px;">
                <a href="index.html">Bubble.am</a> »
                <a href="account.html" style="color:#888;">Account</a> »
                Password
            </div>

            <div style="text-align:center; margin-bottom:15px;">
                <strong>Change Password</strong>
            </div>

            <input id="currentPassword" class="form-control" type="password" placeholder="Current Password">
            <input id="newPassword" class="form-control" type="password" placeholder="New Password">
            <input id="confirmPassword" class="form-control" type="password" placeholder="Confirm New Password">

            <div id="msg" style="font-size:13px; margin-bottom:8px;"></div>

            <button onclick="changePassword()" class="btn btn-primary" style="width:100%;">Change Password</button>

            <hr>
            <div id="footer">
                <div id="footerContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost'
            ? 'http://203.175.125.153'
            : 'http://203.175.125.153';

        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        // Draw background
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 1;
        const gridSize = 40;
        for (let x = 0; x < canvas.width; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        async function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msg = document.getElementById('msg');

            if (!currentPassword || !newPassword || !confirmPassword) {
                msg.style.color = 'red';
                msg.innerText = 'Semua field wajib diisi!';
                return;
            }
            if (newPassword !== confirmPassword) {
                msg.style.color = 'red';
                msg.innerText = 'New password dan confirm password tidak sama!';
                return;
            }
            if (newPassword.length < 6) {
                msg.style.color = 'red';
                msg.innerText = 'Password minimal 6 karakter!';
                return;
            }

            const res = await fetch(`${API_URL}/changepassword`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': token },
                body: JSON.stringify({ currentPassword, newPassword })
            });
            const data = await res.json();
            if (data.success) {
                msg.style.color = 'green';
                msg.innerText = 'Password changed successfully!';
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            } else {
                msg.style.color = 'red';
                msg.innerText = data.message || 'Failed to change password!';
            }
        }
        loadFooter('footerContainer');
    </script>
</body>

</html>
