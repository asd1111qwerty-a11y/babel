<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Play Bubble.am, a free online multiplayer browser game. Eat smaller cells, avoid bigger ones, and climb the leaderboard. No download needed — play now!">
    <meta name="keywords" content="bubbleam, bubble.am, bubleam, buble.am, bubbleam.pl, bubleroyal.com, bubleroyal, agario, agar, io, cell, cells, virus, bacteria, blob, game, games, web game, html5, fun, flash">
    <meta name="robots" content="index, follow">
    <meta name="viewport"
        content="minimal-ui, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="google-site-verification" content="LiPNDr3AHPS_HBWWsUkIL3tYU5vIMQYR17AD7fvhuN4" />

    <title>Bubble.am</title>

    <link rel="canonical" href="https://bubbleam.site/">
    <meta property="og:title" content="Bubble.am — Free Bubble.am Browser Game">
    <meta property="og:description" content="Play Bubble.am free online. Eat smaller cells, avoid bigger ones, climb the leaderboard. No download needed!">
    <meta property="og:url" content="https://bubbleam.site/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Bubble.am — Free Bubble.am Browser Game">
    <meta name="twitter:description" content="Play Bubble.am free online. Eat smaller cells, avoid bigger ones!">

    <link id="favicon" rel="icon" type="image/png" href="assets/img/favicon.png" />

    <link href="https://fonts.googleapis.com/css?family=Ubuntu:700" rel="stylesheet">
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/index.css" rel="stylesheet">
    <script src="assets/js/footer.js"></script>
    <style>
        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <div id="loginOverlay">
        <div id="helloDialog">
            <div style="font-size:14px; margin-bottom:10px;">
                <a href="index.html">Bubble.am</a> »
                <a href="account.html" style="color:#888;">Account</a> »
                <a href="#" style="color:#888">Upload Skin</a>
            </div>

            <div style="margin-bottom:14px;">
                <strong>Upload Skin</strong>
            </div>

            <div style="margin-bottom:12px;">
                <input type="file" id="skinFile" accept=".png" class="form-control" onchange="previewSkin(this)">
                <div style="font-size:12px; color:#aaa; margin-top:4px;">Only PNG, max 2MB</div>
            </div>

            <div style="color:#888; font-size:13px; margin-bottom:12px;">
                We recommend 500x500 PNG images.<br>
            </div>

            <div style="text-align:center;">
                <div id="previewWrap"
                    style="margin:12px auto; width:120px; height:120px; border-radius:50%; overflow:hidden; border:3px solid #ddd; background:#333; display:flex; align-items:center; justify-content:center; position:relative;">
                    <img id="previewImg" src="" alt="preview"
                        style="width:100%; height:100%; object-fit:cover; display:none; position:absolute;">
                    <span id="previewName"
                        style="color:white; font-weight:bold; font-size:16px; z-index:1; text-shadow:1px 1px 3px #000;"></span>
                </div>
            </div>

            <div id="uploadMsg" style="font-size:13px; text-align:center; margin-bottom:8px;"></div>

            <button onclick="doUpload()" class="btn btn-block"
                style="background:linear-gradient(to right, #f0a500, #f5c518); color:white; font-weight:bold; border:none; margin-bottom:8px;">
                Upload Skin
            </button>
            <button onclick="window.location.href='account.html'" class="btn btn-default btn-block">
                Back
            </button>

            <div id="footer">
                <div id="footerContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost'
            ? 'http://203.175.125.153'
            : 'http://203.175.125.153';

        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }
        const cameFrom = sessionStorage.getItem('skinPageAllowed');
        if (!cameFrom) {
            window.location.href = 'account.html';
        }
        sessionStorage.removeItem('skinPageAllowed');

        const username = localStorage.getItem('loggedUser') || '';
        document.getElementById('previewName').innerText = username;

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 1;
        const gridSize = 40;
        for (let x = 0; x < canvas.width; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        function previewSkin(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            if (file.size > 2 * 1024 * 1024) {
                document.getElementById('uploadMsg').style.color = 'red';
                document.getElementById('uploadMsg').innerText = 'File too large! Max 2MB.';
                input.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('previewImg');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function doUpload() {
            const msg = document.getElementById('uploadMsg');
            const file = document.getElementById('skinFile').files[0];
            if (!file) {
                msg.style.color = 'red';
                msg.innerText = 'Please choose a file first!';
                return;
            }
            msg.style.color = '#888';
            msg.innerText = 'Uploading...';

            const formData = new FormData();
            formData.append('skin', file);

            fetch(`${API_URL}/uploadskin`, {
                method: 'POST',
                headers: { 'Authorization': token },
                body: formData
            }).then(r => r.json()).then(data => {
                if (data.success) {
                    msg.style.color = 'green';
                    msg.innerText = '✓ Skin uploaded! Redirecting...';
                    localStorage.setItem('userSkin', data.skin);
                    setTimeout(() => window.location.href = 'account.html', 1500);
                } else {
                    msg.style.color = 'red';
                    msg.innerText = '✗ ' + (data.message || 'Upload failed');
                }
            }).catch(() => {
                msg.style.color = 'red';
                msg.innerText = '✗ Connection error';
            });
        }
        loadFooter('footerContainer');
    </script>
</body>

</html>
